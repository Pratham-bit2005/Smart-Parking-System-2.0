<head>
<title>Smart Parking Locator</title>

<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded" rel="stylesheet">

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  overflow: hidden;
  font-family: Arial;
}

#map {
  height: 100vh;
  width: 100%;
}

#infoBox {
  position: absolute;
  top: 60px;
  left: 20px;

  width: 320px;

  background: rgb(22, 26, 15);
  padding: 20px;
  border-radius: 20px;

  box-shadow: 0 0 30px #78ca1b;

  z-index: 100;
}

#infoBox h2 {
  color: #7ece22;
  margin-bottom: 15px;
  text-align: center;
}

#infoBox p {
  margin-top: 10px;
  color: #65a51b;
}

#navigateBtn {
  width: 100%;
  margin-top: 20px;

  padding: 15px;

  border: none;
  background: #363d37;
  color: rgb(43, 38, 38);

  border-radius: 10px;
  cursor: pointer;
  font-size: 20px;
  transition: all ease 0.3s;
  background: #7ece22;
  font-weight: 4000;
}

#navigateBtn:hover {
  transform: scale(1.08);
  box-shadow: 0 0 10px #5baf16;
}

#startBtn {
  width: 100%;
  margin-top: 15px;
  padding: 15px;
  border: none;
  border-radius: 10px;
  background: #64a719;
  color: white;
  font-size: 18px;
  cursor: pointer;
  display: none;
  transition: all ease 0.3s;
}

#startBtn:hover {
  transform: scale(1.08);
  box-shadow: 0 0 10px #5baf16;
}

#stopBtn {
  width: 100%;
  margin-top: 15px;
  padding: 15px;
  border: none;
  border-radius: 10px;
  background: #c62828;
  color: white;
  font-size: 18px;
  cursor: pointer;
  display: none;
  transition: all ease 0.3s;
}

#stopBtn:hover {
  transform: scale(1.08);
  box-shadow: 0 0 10px #c62828;
}

.travel-card{
  position:fixed;
  bottom:-150px;
  left:50%;
  transform:translateX(-50%);
  width:360px;
  background:#241d1d;
  border-radius:22px;
  padding:18px;
  box-shadow:0 0px 20px #78ca1b;
  transition:.35s;
  z-index:1000;

}

.travel-card.show{
  bottom:20px;

}

.travel-icon{
  position:relative;
  font-size:30px;
  color:#868383;
  cursor:pointer;
  transition:.3s;
  user-select:none;
}

.travel-icons{
  position:relative;
  display:flex;
  justify-content:space-evenly;
  align-items:center;
  margin-bottom:15px;
  padding-bottom:12px;
}

/* Selected icon */
.travel-icon.active{
  color:#5baf16;
}

/* green line below selected icon */
.slider{
  position: absolute;
  bottom: 0;
  height: 3px;
  width: 0;
  background: #78ca1b;
  border-radius: 20px;
  transition: all .3s ease;
}

.travel-info{
  display:flex;
  justify-content:center;
  align-items:center;
  gap:18px;
  font-size:18px;
  font-weight:600;
  color: #5baf16;
}

.dot{
  color:#888;
}
</style>



</head>

<div id="infoBox">

 <button id="stopBtn" style="display:none;"> Stop Journey</button>
</div>


<div id="travelCard" class="travel-card">

<div class="travel-icons">

</div>

async

</script>

</body>
</html>

function initMap() {
  map = new google.maps.Map(
    document.getElementById("map"),
    {
      center: { lat: 19.2360, lng: 73.1290 },
      zoom: 14
    }
  );

  const trafficLayer = new google.maps.TrafficLayer();
  trafficLayer.setMap(map);

  directionsService = new google.maps.DirectionsService();
  directionsRenderer = new google.maps.DirectionsRenderer ({

  polylineOptions: {
    strokeColor: "#7ece22",   // Lime green "#7ece22"
    strokeOpacity: 1,
    strokeWeight: 6
  },
  suppressMarkers: true,
  preserveViewport: true
});

  directionsRenderer.setMap(map);

  loadParkingMarkers();
  getCurrentLocation();

}
     

function getCurrentLocation() {

    navigator.geolocation.getCurrentPosition(
        function(position) {

            userLocation = {
                lat: position.coords.latitude,
                lng: position.coords.longitude
            };

            userMarker = new google.maps.Marker({
            position: userLocation,
            map: map,
            title: "Your Location",

            icon: {
            path: google.maps.SymbolPath.FORWARD_CLOSED_ARROW,
            scale: 7,
            fillColor: "#4285F4",
            fillOpacity: 1,
            strokeColor: "#ffffff",
            strokeWeight: 2,
            rotation: 0
  }
});

            map.setCenter(userLocation);
            startNavigationTracking();

        },
        function() {
            alert("Unable to access location");
        }
    );
}


function startNavigationTracking() {

  navigator.geolocation.watchPosition(

    function(position) {

      const currentPos = {
        lat: position.coords.latitude,
        lng: position.coords.longitude
      };

      userLocation = currentPos;

      userMarker.setPosition(currentPos);

      if (navigationStarted) {
      map.panTo(currentPos);
      map.setZoom(19);
      map.setTilt(0);
      }


      if (previousPos) {

        const heading =
          google.maps.geometry.spherical.computeHeading(
            previousPos,
            currentPos
          );

        userMarker.setIcon({
          path:
            google.maps.SymbolPath.FORWARD_CLOSED_ARROW,

          scale: 7,
          fillColor: "#3E6B11",
          fillOpacity: 1,
          strokeColor: "#2F520C",
          strokeWeight: 2,
          rotation: heading
        });
      }

      previousPos = currentPos;
    },

    function(error) {
      console.log(error);
    },

    {
      enableHighAccuracy: true,
      maximumAge: 0
    }
  );
}


function loadParkingMarkers() {
    parkingLots.forEach(parking => {
        const marker = new google.maps.Marker({
            position: {
                lat: parking.lat,
                lng: parking.lng
            },
            map: map,
            title: parking.name,
            icon: {
                url: "images/SPS-Map-logo2.png",
                scaledSize: new google.maps.Size(50, 50)
            }
        });

        marker.addListener("click", function () {
            selectedParking = parking;

            document.getElementById("parkingName").innerText = parking.name;
            document.getElementById("parkingAddress").innerText = "📍 " + parking.address;
            document.getElementById("parkingSlots").innerText = "🅿 Available Slots: " + parking.slots;

            directionsService.route(
            { origin: userLocation,
              destination: {
              lat: parking.lat,
              lng: parking.lng
            },
            travelMode: google.maps.TravelMode.DRIVING
            },


           function(result, status) {

            if (status === "OK") {

            window.cachedRoute = result;

            // Show the travel card
            document.getElementById("travelCard").classList.add("show");

            // Get distance and duration
            const leg = result.routes[0].legs[0];

            document.getElementById("distance").innerHTML =
                "📍 " + leg.distance.text;

            document.getElementById("duration").innerHTML =
                "⏱️ " + leg.duration.text;
          }
          } 
         );
      });
  });
}

function navigateToParking() {

    if (!selectedParking) {
        alert("Please select a parking lot first.");
        return;
    }

     if (window.cachedRoute) {
        directionsRenderer.setDirections(
            window.cachedRoute
        );

        document.getElementById(
            "startBtn"
        ).style.display = "block";

        return;
    }
        
    navigator.geolocation.getCurrentPosition(
        function (position) {

            const userLocation = {
                lat: position.coords.latitude,
                lng: position.coords.longitude
            };

            console.log("User:", userLocation);
            console.log("Destination:", selectedParking);

            directionsService.route(
                {
                    origin: userLocation,
                    destination: {
                        lat: selectedParking.lat,
                        lng: selectedParking.lng
                    },
                    travelMode: google.maps.TravelMode.DRIVING
                },
                function (result, status) {

                    console.log("Status:", status);

                    if (status === "OK") {

                     directionsRenderer.setDirections(result);

                     document.getElementById(
                     "startBtn"
                    ).style.display = "block";
                   }
                    else {
                        alert("Route Error: " + status);
                    }
                }
            )
          },
        function (error) {
            console.log(error);
            alert("Could not get your location.")
        }
    )      
}
 

document
.getElementById("startBtn")
.addEventListener(
  "click",
  function() {

        map.setZoom(18);

        navigationStarted = true;

        localStorage.setItem(
        "activeNavigation",
        JSON.stringify({
            name: selectedParking.name,
            lat: selectedParking.lat,
            lng: selectedParking.lng
        })
    );

       if (userLocation) {
        map.setCenter(userLocation);
        map.setZoom(19);
        map.setTilt(0);
      }

      setTimeout(() => {
      map.setCenter(userLocation);
      map.setZoom(19);
      map.setTilt(0);
      }, 100);

      navigationStarted = true;

      document.getElementById("stopBtn").style.display = "block";
      document.getElementById("startBtn").style.display = "none";

      },
      function(error) {
        console.log(error);
      },
      {
        enableHighAccuracy: true
      }
    );


    document.getElementById("stopBtn")
.addEventListener("click", function () {

    navigationStarted = false;

    // Remove route
    directionsRenderer.setDirections({
        routes: []
    });

    // Zoom out
     // Smooth zoom out
    let currentZoom = map.getZoom();

    const zoomOut = setInterval(() => {
        if (currentZoom <= 14) {
            clearInterval(zoomOut);
            return;
        }

        currentZoom--;
        map.setZoom(currentZoom);

    }, 150); // decrease for slower animation
    // try 100, 150 or 200

    // Center on user
    if (userLocation) {
        map.panTo(userLocation);
    }

    // Hide buttons
    document.getElementById("stopBtn").style.display = "none";
    document.getElementById("startBtn").style.display = "none";

    // Clear saved navigation
    localStorage.removeItem("activeNavigation");

    // Optional
    selectedParking = null;
    window.cachedRoute = null;
});



window.onload = function () {
    const params = new URLSearchParams(window.location.search);

    if (params.get("floating") === "true") {
        document.getElementById("infoBox").style.display = "none";
    }
};




const icons = document.querySelectorAll(".travel-icon");

icons.forEach(icon => {

    icon.addEventListener("click", function(){

      console.log(this.dataset.mode);

      icons.forEach(i=>i.classList.remove("active"));

      this.classList.add("active");

      calculateRoute(this.dataset.mode);

    });

});




const slider = document.querySelector(".slider");
const icon = document.querySelectorAll(".travel-icon");

function moveSlider(icon){

    slider.style.width = icon.offsetWidth + "px";

    slider.style.left = icon.offsetLeft + "px";

}

moveSlider(document.querySelector(".travel-icon.active"));

icons.forEach(icon => {

    icon.addEventListener("click", function(){

        icons.forEach(i => i.classList.remove("active"));

        this.classList.add("active");

        moveSlider(this);

        calculateRoute(this.dataset.mode);

    });

});



function calculateRoute(mode) {

  const request = {
    origin: userLocation,
    destination: {
      lat: selectedParking.lat,
      lng: selectedParking.lng
  },
   travelMode: google.maps.TravelMode[mode],
   provideRouteAlternatives: true
  };
  

    // Live traffic only for driving
    if (mode === "DRIVING") {
      request.drivingOptions = {
        departureTime: new Date(),
        trafficModel: google.maps.TrafficModel.BEST_GUESS
      };
    }

    directionsService.route(request, function(result, status) {

    if (status === "OK") {

    window.cachedRoute = result;

    directionsRenderer.setDirections(result);

    const bestLeg = result.routes[0].legs[0];

     document.getElementById("distance").innerHTML =
     "📍 " + bestLeg.distance.text;

    if (mode === "DRIVING" && bestLeg.duration_in_traffic) {
      document.getElementById("duration").innerHTML =
      "⏱️ " + bestLeg.duration_in_traffic.text;
    }
     else {
        document.getElementById("duration").innerHTML =
        "⏱️ " + bestLeg.duration.text;
      }
    }
    else {
      console.log(status);
    }
  });
}
