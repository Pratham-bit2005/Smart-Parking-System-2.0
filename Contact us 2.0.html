<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Contact Us - Smart Parking System</title>

<style>
*{ margin:0; padding:0; box-sizing:border-box; font-family:'Segoe UI',sans-serif; }
 
:root {
  --accent: #ceff00;
  --accent-glow: rgba(206,255,0,0.4);
  --bg: #0a0a0a;
  --card: #111;
  --border: rgba(206,255,0,0.2);
}
 
body { background: var(--bg); color: #e0e0e0; }
 
/* HERO */
.hero {
  height: 55vh;
  background: linear-gradient(rgba(0,0,0,0.75), rgba(0,0,0,0.75)),
    url('https://images.unsplash.com/photo-1492144534655-ae79c964c9d7') center/cover no-repeat;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  text-align: center;
  position: relative;
}
 
.hero::after {
  content:''; position:absolute; bottom:0; left:0; right:0;
  height:2px; background:var(--accent); box-shadow:0 0 20px var(--accent-glow);
}
 
.hero h1 {
  font-size: 52px; font-weight: 900; color: var(--accent);
  letter-spacing: -0.5px; animation: fadeDown 1.2s ease;
}
 
.hero p { margin-top:14px; font-size:17px; color:#aaa; }
 
/* SECTION */
.section { padding: 70px 10%; }
 
.section h2 {
  text-align: center; font-size: 38px; font-weight: 800;
  color: var(--accent);
  margin: 0 auto 50px auto; padding: 14px 32px;
  background: #111; border: 1px solid var(--border);
  border-radius: 10px; box-shadow: 0 0 20px var(--accent-glow);
  max-width: 400px;
}
 
/* CONTACT INFO CARDS */
.contact-info {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(220px,1fr));
  gap: 24px;
  margin-bottom: 56px;
}
 
.info-card {
  background: var(--card);
  border: 1px solid rgba(255,255,255,0.06);
  padding: 30px;
  border-radius: 12px;
  text-align: center;
  transition: 0.4s;
}
 
.info-card:hover {
  transform: translateY(-8px);
  border-color: var(--accent);
  box-shadow: 0 0 24px var(--accent-glow);
}
 
.info-card h3 { margin-bottom:10px; color:var(--accent); font-size:17px; font-weight:700; }
.info-card p { color:#888; font-size:14px; }
 
/* FORM */
.contact-form {
  max-width: 680px;
  margin: auto;
  background: var(--card);
  border: 1px solid var(--border);
  padding: 40px;
  border-radius: 14px;
  box-shadow: 0 0 30px rgba(206,255,0,0.1);
}
 
.contact-form input,
.contact-form textarea {
  width: 100%;
  padding: 12px 14px;
  margin-bottom: 18px;
  border: 1px solid rgba(206,255,0,0.2);
  border-radius: 8px;
  outline: none;
  background: rgba(206,255,0,0.04);
  color: white;
  font-size: 14px;
  caret-color: var(--accent);
  transition: 0.3s;
}
 
.contact-form input::placeholder,
.contact-form textarea::placeholder { color:#555; }
 
.contact-form input:focus,
.contact-form textarea:focus {
  border-color: var(--accent);
  box-shadow: 0 0 12px rgba(206,255,0,0.3);
}
 
.contact-form button {
  padding: 12px 32px;
  background: var(--accent);
  border: none;
  border-radius: 8px;
  cursor: pointer;
  transition: 0.3s;
  font-size: 15px;
  font-weight: 700;
  color: #000;
}
 
.contact-form button:hover {
  box-shadow: 0 0 24px var(--accent-glow);
  transform: scale(1.04);
}
 
/* FOOTER */
.footer {
  text-align: center; padding: 20px;
  background: #080808; margin-top: 60px;
  border-top: 1px solid rgba(206,255,0,0.1);
  color: #555; font-size: 13px;
}
 
@keyframes fadeDown { from{opacity:0;transform:translateY(-40px);} to{opacity:1;transform:translateY(0);} }
 
.button-area { display:flex; align-items:center; gap:16px; }
 
.notification {
  background: var(--accent);
  color: #000;
  padding: 11px 24px;
  border-radius: 8px;
  font-weight: 700;
  display: none;
  box-shadow: 0 0 14px var(--accent-glow);
  font-size: 14px;
}
 
@media(max-width:768px){ .hero h1{ font-size:36px; } }
</style>
</head>





<body>

<!-- HERO -->
<section class="hero">
    <h1>Contact Us</h1>
    <p>We’re here to help you with your smart parking needs</p>
</section>

<!-- CONTACT INFO -->
<section class="section">
    <h2>Get In Touch</h2>

    <div class="contact-info">
        <div class="info-card">
            <h3>📍 Address</h3>
            <p>Badlapur, Maharashtra, India</p>
        </div>

        <div class="info-card">
            <h3>📧 Email</h3>
            <p>prathamgharat@gmail.com</p>
        </div>

        <div class="info-card">
            <h3>📞 Phone</h3>
            <p>+91 8010892005</p>
        </div>
    </div>

    <!-- CONTACT FORM -->
    <div class="contact-form">
    <form id="contactForm" onsubmit="validateForm(event)">
       <input type="text" id="name" placeholder="Full Name" required>
       <input type="email" id="email" placeholder="Email Address" required>
       <input type="tel" id="phone" placeholder="Phone Number" required>
       <textarea rows="5" id="message" placeholder="Your Message" required></textarea>

       <div class="button-area">
    <button type="submit">Send Message</button>

    <span id="notification" class="notification">
    Feedback Submitted Successfully!
    </span>
    </div>

  </form>
</div>

</section>

<!-- FOOTER -->
<div class="footer">
    © 2026 Smart Parking System | All Rights Reserved
</div>




<script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>

<script>
function validateForm(event){

// Stops page refresh
event.preventDefault();

let name = document.getElementById("name").value;
let email = document.getElementById("email").value;
let phone = document.getElementById("phone").value;
let message = document.getElementById("message").value;


// Your Name Validation
if (!/^[A-Za-z]+ [A-Za-z]+$/.test(name.trim())) {
    alert("⚠  Please enter a valid full name to continue.");
    return;
}

// Email Validation
if(email === ""){
    alert("⚠ Please enter your email address.");
    return;
}

// Phone Number Validation
if(!/^[0-9]{10}$/.test(phone)){
    alert("⚠ Please enter a valid 10-digit phone number.");
    return;
}

// Message Validationn
if(message === ""){
    alert("⚠ Please enter your message.");
    return;
}
}


emailjs.init("CfoV2pnTBDnUznmu2");

document.getElementById("contactForm")
.addEventListener("submit", function(event){

    event.preventDefault();

    let templateParams = {
        from_name: document.getElementById("name").value,
        from_email: document.getElementById("email").value,
        phone_number: document.getElementById("phone").value,
        message: document.getElementById("message").value
    };

    emailjs.send(
        "service_cf8o6xk",
        "template_6q7eq3m",
        templateParams
    )

    .then(function(response){
    // Show notification
    let notification = document.getElementById("notification");

    notification.innerText = "Feedback Submitted successfully!";
    notification.style.display = "block";

    setTimeout(function () {
        notification.style.display = "none";
    }, 3000);

    // Reset form
    document.querySelector("form").reset();

})
.catch(function(error){

    alert("❌ Unable to send message. Please try again later.");

});
})

</script>

</body>
</html>
